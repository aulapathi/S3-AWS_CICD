name: CD Pipeline - Deploy Angular to Azure Static Web Apps

on:
  workflow_run:
    workflows:
      - CI Pipeline - Angular   # ✅ must match CI name exactly
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    name: Deploy Job
    environment: production

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-dist
          path: .

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_FOREST_0F16A0B00 }}
          action: "upload"
          app_location: "."                # ✅ artifact root
          output_location: "."             # ✅ already built
          skip_app_build: true              # ✅ IMPORTANT (no rebuild)
