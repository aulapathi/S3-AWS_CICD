name: CI Pipeline - Angular

on:
  workflow_dispatch:

env:
  NODE_VERSION: '20'   # ✅ Required for Angular 21

jobs:
  build_job:
    runs-on: ubuntu-latest
    name: Build Angular Job

    steps:
      # ✅ Same as Azure pipeline
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # ✅ Explicit Node setup (Azure did this internally)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ✅ app_location equivalent
      - name: Install Dependencies
        run: npm ci --prefix exampleCICD

      # ✅ Azure "Build" equivalent
      - name: Build Angular App
        run: npm run build --prefix exampleCICD -- --configuration production

      # ✅ Debug (important – confirms output_location)
      - name: Verify build output
        run: ls -R exampleCICD/dist

      # ✅ output_location equivalent
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: exampleCICD/dist/example-cicd/browser
