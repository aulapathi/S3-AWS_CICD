name: CI Pipeline - Angular

on:
  workflow_dispatch:

env:
  NODE_VERSION: '20'   # ✅ taken from Azure SWA reference (critical for Angular 21)

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Job

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # ✅ Explicit Node version (same idea as Azure SWA)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ✅ Same app_location concept as Azure pipeline
      - name: Install Dependencies
        run: npm ci --prefix exampleCICD

      # ✅ Same as Azure "Build" phase
      - name: Build Angular App
        run: npm run build --prefix exampleCICD -- --configuration production

      # ✅ Artifact = equivalent of Azure upload
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: exampleCICD/dist/exampleCICD/browser
