name: CI Pipeline - Angular

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --prefix exampleCICD

      - name: Build Angular app
        run: npm run build --prefix exampleCICD -- --configuration production

      # ✅ Debug proof (optional but useful)
      - name: Verify build output
        run: ls -R exampleCICD/dist

      # ✅ CORRECT artifact path based on angular.json
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: exampleCICD/dist/exampleCICD/browser
