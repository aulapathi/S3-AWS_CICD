name: CI Pipeline - Angular

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --prefix exampleCICD

      - name: Build Angular app
        run: npm run build --prefix exampleCICD -- --configuration production

      # ✅ HARD PROOF STEP
      - name: Show dist output
        run: |
          echo "=== exampleCICD/dist ==="
          find exampleCICD/dist -type f | head -50

      # ✅ ZIP THE BUILD OUTPUT (NO AMBIGUITY)
      - name: Create deploy package
        run: |
          mkdir deploy
          cp -r exampleCICD/dist/* deploy/

      # ✅ UPLOAD ARTIFACT (GUARANTEED)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: deploy
