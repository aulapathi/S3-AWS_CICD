name: CI Pipeline - Angular

on:
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        run: npm ci --prefix exampleCICD

      - name: Build Angular Application
        run: npm run build --prefix exampleCICD -- --configuration production

      # ✅ HARD PROOF
      - name: Show dist contents
        run: |
          echo "===== dist tree ====="
          find exampleCICD/dist -type f | head -50

      # ✅ GUARANTEED ARTIFACT (never empty)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: exampleCICD/dist
